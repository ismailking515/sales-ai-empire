name: 24/7 Expert Amazon Sniper

on:
  schedule:
    - cron: '20,50 * * * *' # Runs at :20 and :50 past every hour
  workflow_dispatch: 

jobs:
  run-expert-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests groq
      - name: Deploy Expert Strike
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STACK_EXCHANGE_KEY: ${{ secrets.STACK_EXCHANGE_KEY }}
        run: python expert_amazon_bot.py
      - name: Save Sales Data
        run: |
          git config --global user.name "Expert Sales Bot"
          git config --global user.email "bot@salesempire.com"
          git add daily_sales.csv
          git commit -m "Logged Expert Lead" || exit 0
          git push
