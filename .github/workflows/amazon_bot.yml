name: 24/7 Amazon Sales Worker

on:
  schedule:
    # This tells GitHub to run your bot at the start of every hour (:00)
    - cron: '0 * * * *' 
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai requests

      - name: Run Amazon Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
        run: python amazon_bot.py
